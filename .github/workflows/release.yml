name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/taodb || true

      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - target/${{ matrix.target }}/release/taodb

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../taodb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz taodb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taodb-${{ matrix.target }}
          path: taodb-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: cd artifacts && sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/taodbhip/taodb/main/install.sh | bash
            ```

            Or download the binary for your platform below.
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
